name: Linting and tests

on:
  push:
    branches: [master, development]
  pull_request:
    branches: [master, development]

env:
  UV_VERSION: "0.11.6"
  PYTHON_VERSION: "3.14t"

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          version: ${{ env.UV_VERSION }}
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: true
      - run: |
          uv sync --group dev
          uv run tox -e pre-commit

  unit-tests:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          version: ${{ env.UV_VERSION }}
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: true
      - name: Run tests
        run: |
          uv sync --group dev
          uv run tox -m unit
      - uses: codecov/codecov-action@v4
        if: ${{ matrix.os == 'ubuntu-latest' }}
        with:
          files: ./coverage.xml

  cargo-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          version: ${{ env.UV_VERSION }}
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: true
      - name: Run Cargo tests
        run: |
          uv sync --group dev
          uv run tox -e cargo-test

  documentation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v7
        with:
          version: ${{ env.UV_VERSION }}
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: true
      - run: |
          uv sync --group dev
          uv run tox -e docs
