name: Linting and tests

on:
  push:
    branches: [master, development]
  pull_request:
    branches: [master, development]

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          version: "0.11.0"
          python-version: "3.14t"
          enable-cache: true
      - run: |
          uv sync --group dev
          uvx tox -e pre-commit

  unit-tests:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          version: "0.11.0"
          python-version: ${{ matrix.python-version }}
          enable-cache: true
      - name: Run tests
        shell: bash
        run: |
          env="py$(echo '${{ matrix.python-version }}' | tr -d '.')"
          uv sync --group dev
          uvx tox -e "$env"
      - uses: codecov/codecov-action@v4
        if: ${{ matrix.os == 'ubuntu-latest' && matrix.python-version == '3.14' }}
        with:
          files: ./coverage.xml

  documentation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v7
        with:
          version: "0.11.0"
          python-version: "3.14t"
          enable-cache: true
      - run: |
          uv sync --group dev
          uvx tox -e docs
