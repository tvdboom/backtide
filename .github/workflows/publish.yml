name: Publish

on:
  push:
    tags:
      # Publish on any tag starting with a `v`, e.g., v0.1.0
      - v*

env:
  PYTHON_VERSION: "3.14"

jobs:
  documentation:
    runs-on: ubuntu-latest
    steps:
      - name: Check
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Fetch all commits/branches
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: true
      - name: Validate tag matches pyproject version
        run: |
          VERSION=$(python - <<'PY'
          import pathlib
          import tomllib

          data = tomllib.loads(pathlib.Path("pyproject.toml").read_text(encoding="utf-8"))
          print(data["project"]["version"])
          PY
          )
          EXPECTED_TAG="v${VERSION}"
          echo "Tag: ${GITHUB_REF_NAME}, expected: ${EXPECTED_TAG}"
          test "${GITHUB_REF_NAME}" = "${EXPECTED_TAG}"
      - name: Install dependencies
        run: |
          uv sync --group docs
      - name: Update documentation
        run: |
          DOC_VERSION="${GITHUB_REF_NAME%.*}"
          echo "Deploying documentation for release ${DOC_VERSION}"
          uv run mike deploy --push --update-aliases "${DOC_VERSION}" latest

  publish:
    runs-on: ubuntu-latest
    environment:
      name: pypi
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: true
      - name: Validate tag matches pyproject version
        run: |
          VERSION=$(python - <<'PY'
          import pathlib
          import tomllib

          data = tomllib.loads(pathlib.Path("pyproject.toml").read_text(encoding="utf-8"))
          print(data["project"]["version"])
          PY
          )
          EXPECTED_TAG="v${VERSION}"
          echo "Tag: ${GITHUB_REF_NAME}, expected: ${EXPECTED_TAG}"
          test "${GITHUB_REF_NAME}" = "${EXPECTED_TAG}"
      - name: Build
        run: uv build
      - name: Check artifacts
        run: uv tool run twine check dist/*
      - name: Publish
        run: uv publish
