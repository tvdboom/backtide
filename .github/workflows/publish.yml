name: Publish

on:
  push:
    tags:
      # Publish on any tag starting with a `v`, e.g., v0.1.0
      - v*

env:
  PYTHON_VERSION: "3.14"

jobs:
  # Check that the tag matches the version in pyproject.toml
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate tag matches pyproject version
        run: |
          VERSION=$(python - <<'PY'
          import pathlib, tomllib
          data = tomllib.loads(pathlib.Path("pyproject.toml").read_text(encoding="utf-8"))
          print(data["project"]["version"])
          PY
          )
          test "${GITHUB_REF_NAME}" = "v${VERSION}"

  documentation:
    runs-on: ubuntu-latest
    needs: validate
    env:
      PYTHONPATH: ${{ github.workspace }}
    steps:
      - name: Check
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Fetch all commits/branches
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: true
      - name: Install dependencies
        run: |
          uv sync --group docs
      - name: Update documentation
        run: |
          DOC_VERSION="${GITHUB_REF_NAME%.*}"
          echo "Deploying documentation for release ${DOC_VERSION}"
          uv run mike deploy --push --update-aliases "${DOC_VERSION}" latest

  build-wheels:
      name: Build wheels - ${{ matrix.os }}
      needs: validate
      runs-on: ${{ matrix.os }}
      strategy:
        fail-fast: false
        matrix:
          os: [ubuntu-latest, macos-latest, windows-latest]
      steps:
        - uses: actions/checkout@v6
        - name: Build wheels
          uses: PyO3/maturin-action@v1
          with:
            command: build
            args: --release --out dist --find-interpreter
            manylinux: auto
        - uses: actions/upload-artifact@v7
          with:
            name: wheels-${{ matrix.os }}
            path: dist/

  build-sdist:
    name: Build source distribution
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      - uses: actions/upload-artifact@v7
        with:
          name: wheels-sdist
          path: dist/

  publish:
    runs-on: ubuntu-latest
    needs: [build-wheels, build-sdist, documentation]
    environment:
      name: pypi
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: true
      - uses: actions/download-artifact@v8
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist/
      - name: Check artifacts
        run: |
          ls -lh dist/
          uvx twine check dist/*
      - name: Publish
        run: uv publish dist/*
