name: Bug Report
description: Create a report to help us fix the bug.
labels: [bug]
body:
  - type: checkboxes
    attributes:
      label: Contribution guidelines
      description: Make sure that your request fulfills all the following requirements.
      options:
      - label: I've read the [contribution guidelines](https://tvdboom.github.io/backtide/latest/contributing/).
        required: true
      - label: The [documentation](https://tvdboom.github.io/backtide/latest/) does not mention anything about my problem.
      - label: There are no [open or closed issues](https://github.com/tvdboom/backtide/issues) that are related to my problem.
  - type: textarea
    validations:
      required: true
    attributes:
      label: Description
      description: Provide a brief description of the bug in 1-2 sentences.
  - type: textarea
    validations:
      required: true
    attributes:
      label: Steps to reproduce
      description: >
        Please provide a [minimal reproducible example](https://en.wikipedia.org/wiki/Minimal_reproducible_example)
        that can reproduce the error when running it. Be as succinct as possible,
        **do not depend on external data files**: instead use simple market data or
        fetch real data from the supported providers (Yahoo Finance, Binance, etc.).
        Example:

        ```python
        from backtide.backtest import run_experiment, ExperimentConfig, GeneralExpConfig, DataExpConfig, StrategyExpConfig
        from backtide.strategies import BuyAndHold

        config = ExperimentConfig(
            general=GeneralExpConfig(name="Test", description="Minimal example"),
            data=DataExpConfig(symbols=["AAPL"]),
            portfolio=PortfolioExpConfig(initial_cash=10000),
            strategies=[StrategyExpConfig(name="BuyAndHold")],
        )

        result = run_experiment(config)
        ```

        If the code is too long, feel free to put it in a public gist and link it
        in the issue: https://gist.github.com.

        In short, **we are going to copy-paste your code** to run it and we expect
        to get the same result as you.

        We acknowledge that crafting a minimal reproducible code example requires
        some effort on your side but it really helps the maintainers quickly reproduce
        the problem and analyze its cause.
      placeholder: |
        ```python
        Sample code to reproduce the problem.
        ```
  - type: textarea
    validations:
      required: true
    attributes:
      label: Expected behaviour
      description: Describe what you'd expect to happen.
      placeholder: |
        Example: The backtest should complete successfully and return results with trades and PnL.
  - type: textarea
    validations:
      required: true
    attributes:
      label: Actual behaviour
      description: >
        Paste or describe the results you observe instead of the expected results.
        If you observe an error, please paste the error message including the
        **full traceback** of the exception. For example:

        ```
        Traceback (most recent call last):
          File "script.py", line 10, in <module>
            result = run_experiment(config)
          File "backtide/backtest.py", line 73, in run_experiment
            ...
        ValueError: Invalid strategy configuration
        ```
      placeholder: |
        Please paste or specifically describe the actual output or traceback.
  - type: textarea
    validations:
      required: true
    attributes:
      label: Environment
      render: Shell
      description: |
        Please provide your Python version and backtide version. You can get this information by running:

        ```python
        import backtide; print(backtide.__version__); import platform; print(f"Python {platform.python_version()}")
        ```
  - type: markdown
    attributes:
      value: Thanks for contributing 🎉!
