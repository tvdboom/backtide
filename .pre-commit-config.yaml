repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.10
    hooks:
    - id: ruff
      types_or: [ python, pyi ]
      args: [--fix]
      files: ^(?!docs/).*\.(py|ipy)$
    - id: ruff-format
      types_or: [ python, pyi ]
      files: ^(?!docs/).*\.(py|ipy)$

  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: 0.11.6
    hooks:
      - id: uv-lock

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-added-large-files
        args: [ --maxkb=80000 ]
      - id: check-merge-conflict
      - id: check-toml
      - id: check-yaml
        args: [--unsafe]  # Only check parsing
      - id: end-of-file-fixer
      - id: mixed-line-ending
      - id: name-tests-test
        args: [--pytest-test-first]
      - id: trailing-whitespace

  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt
        entry: cargo fmt --manifest-path backtide_core/Cargo.toml --
        language: system
        types: [rust]
        pass_filenames: true

      - id: cargo-clippy
        name: cargo clippy
        entry: cargo clippy --manifest-path backtide_core/Cargo.toml --all-targets --all-features -- -D warnings
        language: system
        types: [rust]
        pass_filenames: false
