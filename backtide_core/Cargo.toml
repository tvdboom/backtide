[package]
name = "backtide_core"
version = "0.1.0"
edition = "2021"
description = "A refreshingly simple trading backtester for beginner retail investors"

[lib]
name = "backtide_core"
crate-type = ["cdylib"]

[dependencies]
async-trait = "0.1.89"
pyo3 = { version = "0.28.2", features = ["extension-module"] }
reqwest = { version = "0.13.2", features = ["json", "cookies", "query"] }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
thiserror = "2.0.18"
tokio = { version = "1.50.0", features = ["rt-multi-thread", "macros", "time"] }
