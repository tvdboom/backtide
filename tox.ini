[tox]
env_list =
    pre-commit
    py{311,312,313,314}
    py314-min
    bench
    cargo-test
    docs
labels =
    unit = py311, py311-min, py312, py313, py314


[testenv]
runner = uv-venv-lock-runner
package = wheel
extras = full
dependency_groups = test
changedir = {envtmpdir}
# Run tests outside the repo tree so imports resolve to the installed wheel
# (including the compiled `backtide.core` extension) instead of source files.
commands_pre =
    python -c "from pathlib import Path; import shutil; src = Path(r'{toxinidir}') / 'tests'; dst = Path('tests'); shutil.copytree(src, dst, dirs_exist_ok=True)"
commands =
    pytest -n=auto tests/

[testenv:pre-commit]
skip_install = true
changedir = {toxinidir}
commands_pre =
dependency_groups = pre-commit
commands =
    pre-commit run --all-files --show-diff-on-failure

[testenv:py314]
commands =
    pytest \
        -n=auto \
        --cov=backtide \
        --cov-report=xml:{toxinidir}/coverage.xml \
        --cov-fail-under=40 \
        tests/

[testenv:py311-min]
# Test against the oldest compatible versions of direct runtime dependencies.
runner = uv-venv-runner
base_python = py311
allowlist_externals = uv
commands =
    uv pip install \
        --python {envpython} \
        --resolution lowest-direct \
        --reinstall \
        -e {toxinidir}
    pytest -n=auto tests/

[testenv:bench]
skip_install = true
changedir = {toxinidir}
commands_pre =
allowlist_externals = cargo
commands =
    cargo bench --manifest-path backtide_core/Cargo.toml

[testenv:cargo-test]
skip_install = true
changedir = {toxinidir}
commands_pre =
allowlist_externals = cargo, rustup
commands =
    rustup component add llvm-tools
    cargo install cargo-llvm-cov --quiet
    cargo llvm-cov \
        --manifest-path src/backtide_core/Cargo.toml \
        --fail-under-lines 40 \
        --lcov --output-path {toxinidir}/rust-coverage.lcov

[testenv:docs]
base_python = py313
package = editable
changedir = {toxinidir}
commands_pre =
dependency_groups = docs
set_env =
    PYTHONPATH = {toxinidir}
commands =
    mkdocs build --strict
