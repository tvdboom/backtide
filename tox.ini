[tox]
env_list =
    pre-commit
    py{311,312,313,314}
    py314-min
    bench
    cargo-test
    docs
labels =
    unit = py311, py311-min, py312, py313, py314


[testenv]
runner = uv-venv-lock-runner
package = wheel
extras = full
dependency_groups = test
changedir = {envtmpdir}
commands =
    pytest -n=auto {toxinidir}/tests/

[testenv:pre-commit]
skip_install = true
changedir = {toxinidir}
commands_pre =
dependency_groups = pre-commit
commands =
    pre-commit run --all-files --show-diff-on-failure

[testenv:py314]
commands =
    pytest \
        -n=auto \
        --cov=backtide \
        --cov-report=xml:{toxinidir}/coverage.xml \
        --cov-fail-under=20 \
        {toxinidir}/tests/

[testenv:py311-min]
# Test against the oldest compatible versions of direct runtime dependencies.
runner = uv-venv-runner
base_python = py311
allowlist_externals = uv
commands =
    uv pip install \
        --python {envpython} \
        --resolution lowest-direct \
        --reinstall \
        -e {toxinidir}
    pytest -n=auto {toxinidir}/tests/

[testenv:bench]
skip_install = true
changedir = {toxinidir}
commands_pre =
passenv = PATH, LD_LIBRARY_PATH
allowlist_externals = cargo
commands =
    cargo bench --manifest-path src/backtide_core/Cargo.toml

[testenv:cargo-test]
skip_install = true
changedir = {toxinidir}
commands_pre =
passenv = PATH, LD_LIBRARY_PATH, PYO3_PYTHON
allowlist_externals = cargo
commands =
    cargo test \
        --manifest-path src/backtide_core/Cargo.toml \
        --no-default-features

[testenv:docs]
base_python = py313
package = editable
changedir = {toxinidir}
commands_pre =
dependency_groups = docs
set_env =
    PYTHONPATH = {toxinidir}
commands =
    mkdocs build --strict
