[tox]
env_list =
    pre-commit
    py{311,312,313,314}
    py314-min
    bench
    cargo-test
    docs
labels =
    unit = py311, py311-min, py312, py313, py314

# Minimum coverage thresholds (percent).
min_coverage = 50


[testenv]
runner = uv-venv-lock-runner
package = wheel
extras = full
dependency_groups = test
changedir = {envtmpdir}
commands =
    pytest -n=auto {toxinidir}/tests/

[testenv:pre-commit]
skip_install = true
changedir = {toxinidir}
commands_pre =
dependency_groups = pre-commit
commands =
    pre-commit run --all-files --show-diff-on-failure

[testenv:py314]
commands =
    pytest \
        -n=auto \
        --cov=backtide \
        --cov-report=xml:{toxinidir}/coverage.xml \
        --cov-fail-under={[tox]min_coverage} \
        {toxinidir}/tests/

[testenv:py311-min]
# Test against the oldest compatible versions of direct runtime dependencies.
runner = uv-venv-runner
base_python = py311
allowlist_externals = uv
commands =
    uv pip install \
        --python {envpython} \
        --resolution lowest-direct \
        --reinstall \
        -e {toxinidir}
    pytest -n=auto {toxinidir}/tests/

[testenv:bench]
skip_install = true
changedir = {toxinidir}
commands_pre =
passenv = PATH, LD_LIBRARY_PATH, PYO3_PYTHON
set_env =
    PYO3_PYTHON = {envpython}
allowlist_externals = cargo
commands =
    {envpython} {toxinidir}/scripts/run_cargo.py \
        cargo bench \
            --manifest-path src/backtide_core/Cargo.toml \
            --no-default-features

[testenv:cargo-test]
# Run Rust tests with line coverage via cargo-llvm-cov. Fails if coverage
# drops below the configured minimum.
skip_install = true
changedir = {toxinidir}
passenv = PATH, LD_LIBRARY_PATH, PYO3_PYTHON
set_env =
    PYO3_PYTHON = {envpython}
allowlist_externals = cargo, rustup
commands_pre =
    rustup component add llvm-tools-preview
    cargo install cargo-llvm-cov --locked
commands =
    {envpython} {toxinidir}/scripts/run_cargo.py \
        cargo llvm-cov \
            --manifest-path src/backtide_core/Cargo.toml \
            --no-default-features \
            --fail-under-lines {[tox]min_coverage} \
            --summary-only

[testenv:docs]
base_python = py313
package = editable
changedir = {toxinidir}
commands_pre =
dependency_groups = docs
set_env =
    PYTHONPATH = {toxinidir}
commands =
    mkdocs build --strict
